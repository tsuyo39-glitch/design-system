name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を与える。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に絞る（進行中のデプロイはキャンセル）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages 配信 API はまれに "Deployment failed, try again later." を返すため、
      # 少し待って自動で 2 回までリトライする。
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deployment_retry
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 30
      - if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
